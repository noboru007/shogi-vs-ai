<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Shogi Web</title>
    <link rel="stylesheet" href="style.css?v=mobile1">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="theme-color" content="#8b4513">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>
    <div class="container">
        <div class="game-area">
            <div id="gote-hand" class="hand-area">
                <div class="hand-label">[後手持駒] <span id="gote-model-label" class="model-name-label"></span>
                    <span id="gote-thinking" class="thinking-label" style="display:none;">(考え中...)</span>
                </div>
                <div class="hand-pieces" id="gote-hand-pieces"></div>
            </div>

            <div id="board" class="board">
                <!-- Grid will be generated by JS -->
            </div>

            <div id="sente-hand" class="hand-area">
                <div class="hand-label">[先手持駒] <span id="sente-model-label" class="model-name-label"></span>
                    <span id="sente-thinking" class="thinking-label" style="display:none;">(考え中...)</span>
                </div>
                <div class="hand-pieces" id="sente-hand-pieces"></div>
            </div>

            <div class="status-area">
                <div id="turn-indicator">手番: 先手 (下)</div>
                <div id="reasoning-area" style="display:none;"></div> <!-- AI Reason Box -->
                <div id="game-controls">
                    <button onclick="showAiSettings()">対局設定 (Game Settings)</button>
                    <button id="stop-match-btn" onclick="stopAiMatch()" style="display:none;">⏹ 中止</button>
                    <button id="video-download-btn" onclick="downloadMatchAudio()" style="display:none;">📥
                        素材DL</button>
                </div>
            </div>

            <div id="ai-settings" class="ai-settings-panel">
                <h3>対局設定</h3>
                <div>
                    <label>先手：</label>
                    <select id="sente-model">
                        <!-- Populated by JS MODEL_OPTIONS -->
                    </select>
                </div>
                <div>
                    <label>RETRY回数：</label>
                    <select id="max-retries">
                        <option value="1">1回</option>
                        <option value="2" selected>2回</option>
                        <option value="3">3回</option>
                    </select>
                    <span class="info-icon" onclick="showRetryInfo()">ℹ️</span>
                </div>
                <div>
                    <label>後手：</label>
                    <select id="gote-model">
                        <!-- Populated by JS MODEL_OPTIONS -->
                    </select>
                </div>
                <div>
                    <label for="ai_instruction_type">AIへの指示レベル</label>
                    <select id="ai_instruction_type">
                        <option value="simple">シンプルな役割設定のみ</option>
                        <option value="medium" selected>正確で最善な一手の思考をルール付けする</option>
                        <option value="advanced">選択可能な合法手リストを教えてあげる</option>
                    </select>
                </div>

                <!-- Video Mode -->
                <div class="video-mode-option">
                    <label>
                        <input type="checkbox" id="video-mode"> 📹 動画用データを生成する
                    </label>
                </div>

                <!-- TTS (Voice Narration) Settings -->
                <div class="tts-option">
                    <label>
                        <input type="checkbox" id="tts-enabled"> 手番解説を読み上げる
                    </label>
                </div>
                <div id="tts-save-option" class="tts-save-option">
                    <label>
                        <input type="checkbox" id="tts-save-file"> 音声ファイルを保存する
                    </label>
                </div>

                <hr class="settings-divider">

                <!-- Resume Feature -->
                <div class="resume-section">
                    <details>
                        <summary class="resume-summary">上級者: SFENから再開</summary>
                        <div class="resume-content">
                            <input type="text" id="resume-sfen" placeholder="SFEN文字列を入力..." class="resume-input">
                            <button onclick="startAiVsAiMatch(true)" class="btn-resume">SFENから再開</button>
                        </div>
                    </details>
                </div>

                <button onclick="startAiVsAiMatch(false)">対局開始</button>
            </div>


        </div>
    </div>

    <!-- Info Modal -->
    <div id="retry-info-modal" class="modal-overlay" onclick="closeRetryInfo(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close-btn" onclick="closeRetryInfo()">×</span>
            <p>使用しているLLMは将棋に特化したものではありません。そのためSFENデータを正確に読むことができずに、誤った手を打とうとすることがあります。</p>
            <p>アプリはこのRetry回数だけLLMに次の手を考えさせ、それでも正しい手を打つことができなかった場合、自身が代わりに差してターンを終了します。</p>
        </div>
    </div>

    <!-- Promotion Modal -->
    <div id="promotion-modal" class="modal-overlay">
        <div class="modal-content modal-center">
            <p class="modal-title">成りますか？</p>
            <div class="modal-actions">
                <button onclick="resolvePromotion(true)" class="btn-modal">成る</button>
                <button onclick="resolvePromotion(false)" class="btn-modal">成らない</button>
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="modal-overlay"
        onclick="document.getElementById('game-over-modal').style.display = 'none'">
        <div class="modal-content modal-center" onclick="event.stopPropagation()">
            <p class="modal-title-large">勝負あり！</p>
            <p id="game-over-message" class="modal-message">新しい対局を選んでください</p>
            <div class="modal-actions-wrap">
                <button id="download-audio-btn" onclick="downloadMatchAudio()" class="btn-modal" style="display: none;">
                    音声ファイルをダウンロード
                </button>
                <button onclick="document.getElementById('game-over-modal').style.display = 'none'"
                    class="btn-modal">閉じる</button>
            </div>
        </div>
    </div>

    <!-- Generic Message Modal -->
    <div id="message-modal" class="modal-overlay" onclick="closeMessage(event)">
        <div class="modal-content modal-center" onclick="event.stopPropagation()">
            <span class="modal-close-btn" onclick="closeMessage()">×</span>
            <p id="message-text" class="modal-message-text"></p>
            <button onclick="closeMessage()" class="btn-modal">閉じる</button>
        </div>
    </div>

    <script src="script.js?v=debug3"></script>
</body>

</html>
